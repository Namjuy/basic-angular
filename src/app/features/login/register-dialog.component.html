<h2 mat-dialog-title>Đăng ký tài khoản</h2>

<mat-dialog-content>
  <form [formGroup]="registerForm" class="register-form">
    
    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Họ và tên</mat-label>
      <input matInput formControlName="name" placeholder="Nhập họ và tên">
      <mat-error *ngIf="registerForm.get('name')?.hasError('required')">Vui lòng nhập họ và tên</mat-error>
    </mat-form-field>

    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Email</mat-label>
      <input matInput formControlName="email" type="email" placeholder="Nhập email">
      <mat-error *ngIf="registerForm.get('email')?.hasError('required')">Vui lòng nhập email</mat-error>
      <mat-error *ngIf="registerForm.get('email')?.hasError('email')">Email không hợp lệ</mat-error>
    </mat-form-field>

    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Mật khẩu</mat-label>
      <input matInput [type]="hidePassword ? 'password' : 'text'" formControlName="password" placeholder="Nhập mật khẩu">
      <button mat-icon-button matSuffix (click)="hidePassword = !hidePassword" type="button" tabindex="-1">
        <mat-icon>{{hidePassword ? 'visibility_off' : 'visibility'}}</mat-icon>
      </button>
      <mat-error *ngIf="registerForm.get('password')?.hasError('required')">Vui lòng nhập mật khẩu</mat-error>
      <mat-error *ngIf="registerForm.get('password')?.hasError('minlength')">Mật khẩu phải có ít nhất 6 ký tự</mat-error>
    </mat-form-field>

    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Xác nhận mật khẩu</mat-label>
      <input matInput [type]="hideConfirmPassword ? 'password' : 'text'" formControlName="confirmPassword" placeholder="Nhập lại mật khẩu">
      <button mat-icon-button matSuffix (click)="hideConfirmPassword = !hideConfirmPassword" type="button" tabindex="-1">
        <mat-icon>{{hideConfirmPassword ? 'visibility_off' : 'visibility'}}</mat-icon>
      </button>
      <mat-error *ngIf="registerForm.get('confirmPassword')?.hasError('required')">Vui lòng xác nhận mật khẩu</mat-error>
      <mat-error *ngIf="registerForm.get('confirmPassword')?.hasError('passwordMismatch')">Mật khẩu xác nhận không khớp</mat-error>
    </mat-form-field>

  </form>
</mat-dialog-content>

<mat-dialog-actions align="end">
  <button mat-button (click)="onCancel()">Hủy</button>
  <button mat-flat-button color="primary" (click)="onSubmit()" [disabled]="registerForm.invalid">
    Đăng ký
  </button>
</mat-dialog-actions>

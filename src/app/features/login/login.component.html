<div class="login-container">
  <mat-card class="login-card">
    <mat-card-header>
      <mat-card-title>Đăng nhập</mat-card-title>
      <mat-card-subtitle>Chào mừng bạn quay trở lại</mat-card-subtitle>
    </mat-card-header>

    <mat-card-content>
      <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="login-form">
        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Email</mat-label>
          <input matInput
                 type="email"
                 formControlName="email"
                 placeholder="your@email.com">
          <mat-icon matSuffix>email</mat-icon>
          <mat-error *ngIf="email?.invalid && email?.touched">
            <span *ngIf="email?.errors?.['required']">Email là bắt buộc</span>
            <span *ngIf="email?.errors?.['email']">Email không hợp lệ</span>
          </mat-error>
        </mat-form-field>

        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Mật khẩu</mat-label>
          <input matInput
                 [type]="hidePassword ? 'password' : 'text'"
                 formControlName="password"
                 placeholder="Mật khẩu của bạn">
          <button mat-icon-button matSuffix (click)="hidePassword = !hidePassword" type="button">
            <mat-icon>{{hidePassword ? 'visibility_off' : 'visibility'}}</mat-icon>
          </button>
          <mat-error *ngIf="password?.invalid && password?.touched">
            <span *ngIf="password?.errors?.['required']">Mật khẩu là bắt buộc</span>
            <span *ngIf="password?.errors?.['minlength']">Mật khẩu phải có ít nhất 6 ký tự</span>
          </mat-error>
        </mat-form-field>

        <button mat-raised-button
                color="primary"
                type="submit"
                class="login-button"
                [disabled]="isLoading">
          <mat-icon *ngIf="isLoading">refresh</mat-icon>
          <span *ngIf="!isLoading">Đăng nhập</span>
          <span *ngIf="isLoading">Đang xử lý...</span>
        </button>
      </form>
    </mat-card-content>

    <mat-card-actions class="card-actions">
      <button mat-button color="primary" type="button" (click)="openRegisterDialog()">Đăng ký tài khoản</button>
      <button mat-button type="button">Quên mật khẩu?</button>
    </mat-card-actions>
  </mat-card>
</div>
